  events:
    - http:
        method: post
        path: /deliveries/{id}/no-customer-found
        cors: ${file(templates/cors.yml):${calo:stage}}
        authorizer:
          authorizerId:
            Ref: Authorizer
          type: COGNITO_USER_POOLS

unableToDeliver:
  handler: src/delivery/unableToDeliver/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sns:Publish
      Resource:
        - Fn::ImportValue: calo-sns-${calo:stage}-SendSlackTopicArn
  environment:
    SLACK_TOPIC_ARN:
      Fn::ImportValue: calo-sns-${calo:stage}-SendSlackTopicArn
  events:
    - http:
        method: post
        path: /deliveries/{id}/unable-to-deliver
        cors: ${file(templates/cors.yml):${calo:stage}}
        authorizer:
          authorizerId:
            Ref: Authorizer
          type: COGNITO_USER_POOLS
