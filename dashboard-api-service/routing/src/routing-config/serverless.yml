updateRoutingConfig:
  handler: src/routing-config/update/endpoint.handler
  iamRoleStatementsInherit: true
  events:
    - http:
        method: put
        path: /routing-config/{id}
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer

createRoutingConfig:
  handler: src/routing-config/create/endpoint.handler
  iamRoleStatementsInherit: true
  events:
    - http:
        method: post
        path: /routing-config
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer

getAllRoutingConfigs:
  handler: src/routing-config/getAll/endpoint.handler
  iamRoleStatementsInherit: true
  events:
    - http:
        method: get
        path: /{country}/routing-config/{kitchen}/{time}
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer

getRoutePlansForConfig:
  handler: src/routing-config/getRoutePlansForConfig/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatementsName: ${self:service}-${self:provider.stage}-getRPForConfig
  events:
    - http:
        method: get
        path: /routing-config/{id}/route-plans/{day}
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer

runRoutingConfig:
  handler: src/routing-config/runRoutingConfig/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatements:
    - Effect: Allow
      Action: lambda:InvokeFunction
      Resource:
        Fn::GetAtt: [GenerateTimeWindowRouteLambdaFunction, Arn]
  events:
    - http:
        method: post
        path: /routing-config/{id}/run
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    WORKER_FUNCTION_NAME: ${self:service}-${self:provider.stage}-generateTimeWindowRoute

analyzeRoutePlan:
  handler: src/routing-config/analyzeCompletedSimulatedRoute/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Fn::ImportValue: calo-${self:provider.stage}-S3Name
              - '/route-plans/*'
  events:
    - http:
        method: get
        path: /route-plans/{id}/analyze-simulated
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    BUCKET_NAME: ${self:custom.BUCKET_NAME}

generateTimeWindowRoute:
  handler: src/routing-config/generateTimeWindowRoute/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatementsName: ${self:service}-${self:provider.stage}-genTWRoute
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sqs:SendMessage
      # Uses driver service's SQS because the location service consumes from that queue
      Resource:
        Fn::ImportValue: calo-dashboard-driver-api-${self:provider.stage}-TimeWindowRouteSQSArn
  events:
    - http:
        method: post
        path: /route-plans/{id}/time-window
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    TIME_WINDOW_QUEUE_URL:
      Fn::Sub:
        - 'https://sqs.${Region}.amazonaws.com/${AccountId}/${QueueName}'
        - Region:
            Ref: AWS::Region
          AccountId:
            Ref: AWS::AccountId
          QueueName: calo-dashboard-driver-${self:provider.stage}-time-window-route

generateDynamicRouting:
  handler: src/routing-config/generateDynamicRouting/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatementsName: ${self:service}-${self:provider.stage}-genDynRouting
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sqs:SendMessage
      # Uses driver service's SQS because the location service consumes from that queue
      Resource:
        Fn::ImportValue: calo-dashboard-driver-api-${self:provider.stage}-TimeWindowRouteSQSArn
    - Effect: Allow
      Action:
        - s3:GetObject
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Fn::ImportValue: calo-${self:provider.stage}-S3Name
              - '/uk-postcodes/*'
  events:
    - http:
        method: post
        path: /route-plans/dynamic-routing
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    BUCKET_NAME: ${self:custom.BUCKET_NAME}
    TIME_WINDOW_QUEUE_URL:
      Fn::Sub:
        - 'https://sqs.${Region}.amazonaws.com/${AccountId}/${QueueName}'
        - Region:
            Ref: AWS::Region
          AccountId:
            Ref: AWS::AccountId
          QueueName: calo-dashboard-driver-${self:provider.stage}-time-window-route

approveDynamicRoute:
  handler: src/routing-config/approveDynamicRoute/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Fn::ImportValue: calo-${self:provider.stage}-S3Name
              - '/route-plans/*'
    - Effect: Allow
      Action:
        - s3:PutObject
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Fn::ImportValue: calo-${self:provider.stage}-S3Name
              - '/route-plans/*'
  events:
    - http:
        method: post
        path: /route-plans/dynamic-routing/approve
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    BUCKET_NAME: ${self:custom.BUCKET_NAME}

getTimeWindowRoute:
  handler: src/routing-config/getTimeWindowRoute/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Fn::ImportValue: calo-${self:provider.stage}-S3Name
              - '/route-plans/*'
    - Effect: Allow
      Action:
        - cognito-idp:AdminGetUser
      Resource:
        Fn::ImportValue: calo-${self:provider.stage}-DriverCognitoUserPoolMFAArn
  events:
    - http:
        method: get
        path: /route-plans/time-window
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
  environment:
    BUCKET_NAME: ${self:custom.BUCKET_NAME}
    DRIVER_POOL_ID:
      Fn::ImportValue: calo-${self:provider.stage}-DriverCognitoUserPoolMFARef

recalculateAutoRouteETA:
  handler: src/routing-config/recalculateAutoRouteETA/endpoint.handler
  iamRoleStatementsInherit: true
  iamRoleStatementsName: ${self:service}-${self:provider.stage}-recalcETA
  iamRoleStatements:
    - Effect: Allow
      Action:
        - execute-api:Invoke
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:execute-api:'
              - Ref: AWS::Region
              - ':'
              - Ref: AWS::AccountId
              - ':'
              - Fn::ImportValue: sls-calo-location-api-${self:provider.stage}-HttpApiId
              - '/*/POST/v1/routing/generate-route'
  environment:
    LOCATION_SERVICE_URL:
      Fn::ImportValue: sls-calo-location-api-${self:provider.stage}-HttpApiUrl
  events:
    - http:
        method: post
        path: /route-plans/recalculate-eta
        cors: ${file(templates/cors.yml):${self:provider.stage}}
        authorizer:
          type: TOKEN
          authorizerId:
            Fn::ImportValue: calo-dashboard-${self:provider.stage}-customAuthorizer
